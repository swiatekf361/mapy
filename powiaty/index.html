<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa powiatów</title>
    <link rel="stylesheet" href="../core/style.css">
</head>
<body onload="zaladuj('powiaty')">
    <main>
        <span id="mapa"></span>
        <div id="powiat_info">
            <input type="search" name="powiaty" id="powiaty" oninput="szukaj(this.value)" placeholder="Szukaj powiatu">
            <ul id="wyszukiwarka"></ul>
            <span id="more_info">
            <h2 id="nazwa">wybierz powiat</h2>
            <p id="siedziba"></p>
            <p id="wojewodztwo"></p>
            <p id="powierzchnia"></p>
            <p id="ludnosc"></p>
            <p id="gestosc"></p>
            <p id="tablice"></p>
            </span>
        </div>
    </main>

    <script src="script.js"></script>
    <script src="../core/core.js"></script>
    <script src="../core/obrazki.js"></script>
    <footer>
        <i>mapa by <a href="https://commons.wikimedia.org/wiki/File:POLSKA_powiaty.svg">Megaemce</a>, <a href="https://creativecommons.org/licenses/by-sa/4.0">CC BY-SA 4.0</a>, via Wikimedia Commons</i><br>
        <i>Wszystkie zamieszczone informacje zostały pozyskane z Wikipedii</i>
    </footer>
</body>
</html>
